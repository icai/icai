name: Update README Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"   # 每天更新一次
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # 生成 GitHub Stats 卡
      - name: Generate Stats Card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: stats
          options: username=icai&show_icons=true&theme=radical
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 生成 Top Languages 卡
      - name: Generate Top Languages Card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=icai&layout=compact&theme=radical&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 自动提交 SVG
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stats cards" || exit 0
          git push